<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="dark">
<head>
  {% include head.html %}
  <script>
  // Apply saved theme + language before first paint (prevents flash)
  (function(){
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
    if (localStorage.getItem('lang') === 'ko') document.documentElement.classList.add('ko');
  })();
  </script>
</head>
<body>
  {% include nav.html %}
  <div class="mobile-nav-backdrop" id="mobile-backdrop"></div>

  {{ content }}

  {% include footer.html %}

  <script>
  // ── Theme ──────────────────────────────────────────────────────────────────
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.querySelectorAll('.theme-btn').forEach(b => b.textContent = t === 'dark' ? '🌙' : '☀️');
    localStorage.setItem('theme', t);
  }
  (() => applyTheme(localStorage.getItem('theme') || 'dark'))();
  document.querySelectorAll('.theme-btn').forEach(b =>
    b.addEventListener('click', () => applyTheme(
      document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
    ))
  );

  // ── Language toggle ────────────────────────────────────────────────────────
  function applyLang(lang) {
    document.documentElement.classList.toggle('ko', lang === 'ko');
    document.querySelectorAll('.lang-btn').forEach(x => x.textContent = lang === 'en' ? '한국어' : 'English');
    // Legacy data-en / data-ko attribute support
    document.querySelectorAll('[data-en]').forEach(el => {
      if (lang === 'ko' && el.dataset.ko) el.textContent = el.dataset.ko;
      else el.textContent = el.dataset.en;
    });
    localStorage.setItem('lang', lang);
  }
  let _lang = localStorage.getItem('lang') || 'en';
  applyLang(_lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => {
    _lang = _lang === 'en' ? 'ko' : 'en';
    applyLang(_lang);
  }));

  // ── Dropdowns (click only) ─────────────────────────────────────────────────
  document.querySelectorAll('.has-dropdown').forEach(item => {
    item.querySelector('button').addEventListener('click', e => {
      e.stopPropagation();
      const was = item.classList.contains('open');
      document.querySelectorAll('.has-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!was) item.classList.add('open');
    });
  });
  document.addEventListener('click', () =>
    document.querySelectorAll('.has-dropdown.open').forEach(d => d.classList.remove('open'))
  );

  // ── Hamburger ──────────────────────────────────────────────────────────────
  const _hb = document.getElementById('hamburger');
  const _mn = document.getElementById('mobile-nav');
  const _bd = document.getElementById('mobile-backdrop');
  if (_hb && _mn) {
    function _closeMenu() {
      _mn.classList.remove('open');
      _hb.classList.remove('open');
      _hb.setAttribute('aria-expanded', false);
      if (_bd) _bd.classList.remove('open');
      document.body.style.overflow = '';
    }
    _hb.addEventListener('click', () => {
      const o = _mn.classList.toggle('open');
      _hb.classList.toggle('open', o);
      _hb.setAttribute('aria-expanded', o);
      if (_bd) _bd.classList.toggle('open', o);
      document.body.style.overflow = o ? 'hidden' : '';
    });
    if (_bd) _bd.addEventListener('click', _closeMenu);
  }
  // Mobile sub-menus (driven by data-sub attribute)
  document.querySelectorAll('.m-toggle[data-sub]').forEach(b => {
    const s = document.getElementById(b.dataset.sub);
    if (s) b.addEventListener('click', () => {
      const o = s.classList.toggle('open');
      b.classList.toggle('open', o);
    });
  });

  // ── Cascading hero waves (canvas) ─────────────────────────────────────────
  (function() {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var colors = ['rgba(155,101,255,','rgba(109,204,221,','rgba(126,184,247,','rgba(251,111,132,','rgba(155,101,255,'];
    var ops    = [0.13, 0.09, 0.07, 0.06, 0.05];
    var phases = [0, 1.2, 2.4, 0.6, 1.8];
    var speeds = [0.7, 0.5, 0.35, 0.6, 0.45];
    var ampls  = [28, 24, 18, 22, 16];
    var freqs  = [1.1, 1.7, 2.3, 1.4, 2.0];
    var bases  = [0.75, 0.80, 0.84, 0.88, 0.92];

    document.querySelectorAll('.home-hero, .page-header, .course-hero').forEach(function(hero) {
      var cv = document.createElement('canvas');
      cv.className = 'hero-waves';
      hero.insertBefore(cv, hero.firstChild);
      var ctx = cv.getContext('2d');
      var t = Math.random() * 100;

      function resize() {
        cv.width  = window.innerWidth;
        cv.height = hero.offsetHeight || 300;
      }
      resize();
      window.addEventListener('resize', resize);

      function draw() {
        var w = cv.width, h = cv.height;
        ctx.clearRect(0, 0, w, h);
        for (var c = 4; c >= 0; c--) {
          var bY = h * bases[c];
          ctx.beginPath();
          ctx.moveTo(0, h);
          for (var x = 0; x <= w; x += 4) {
            var nx = x / w;
            var y = bY
              - Math.sin(nx * Math.PI * freqs[c] * 2 + t * speeds[c] + phases[c]) * ampls[c]
              - Math.sin(nx * Math.PI * freqs[c] * 3.7 + t * speeds[c] * 0.6 + phases[c] * 1.4) * ampls[c] * 0.35;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.closePath();
          ctx.fillStyle = colors[c] + ops[c] + ')';
          ctx.fill();
        }
        t += 0.01;
        requestAnimationFrame(draw);
      }
      draw();
    });
  })();
  </script>
  {% if page.layout == 'course' %}{% include course_scripts.html %}{% endif %}
</body>
</html>
